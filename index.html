<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0e" />
<title>Equipment Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b0b0e; --surface: #16161b; --surface-2: #1f1f26; --border: #2a2a33;
    --text: #ececf1; --text-dim: #9a9aa6; --text-faint: #6b6b76; --accent: #7c83ff;
    --accent-soft: rgba(124,131,255,0.15); --ok: #3ddc84; --ok-soft: rgba(61,220,132,0.12);
    --low: #ffaa33; --low-soft: rgba(255,170,51,0.12); --out: #ff4d5e; --out-soft: rgba(255,77,94,0.14);
    --shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px; min-height: 100vh; overscroll-behavior-y: auto;
  }
  body { padding-bottom: 100px; }
  header {
    position: sticky; top: 0; z-index: 10; background: rgba(11,11,14,0.85);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border); padding: 14px 16px 10px;
  }
  .header-content { max-width: 720px; margin: 0 auto; }
  .title-row { display: flex; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .search { position: relative; margin-bottom: 10px; }
  .search input {
    width: 100%; padding: 11px 14px 11px 40px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; color: var(--text);
    font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-faint);
  }
  .filters-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .filter-select-wrapper { position: relative; flex: 1; min-width: 0; }
  .filter-select-wrapper svg {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-faint); pointer-events: none;
  }
  .filter-select {
    width: 100%; padding: 10px 34px 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; color: var(--text);
    font-size: 14px; font-weight: 500; outline: none; cursor: pointer;
    appearance: none; -webkit-appearance: none; -moz-appearance: none; transition: border-color 0.15s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--surface); color: var(--text); padding: 8px; }
  .filter-select.empty { color: var(--text-faint); }

  main { padding: 12px 16px; }
  .item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 10px 12px; margin-bottom: 8px; cursor: pointer;
    transition: transform 0.1s; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .item:active { transform: scale(0.99); }
  .item.status-out { border-color: rgba(255,77,94,0.35); background: linear-gradient(180deg, var(--out-soft), var(--surface)); }
  .item.status-low  { border-color: rgba(255,170,51,0.3);  background: linear-gradient(180deg, var(--low-soft), var(--surface)); }
  .item-name {
    font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .item-name-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta {
    font-size: 13px; color: var(--text-dim); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px;
  }
  .item-meta .sep { color: var(--text-faint); }
  .item-meta .qty { font-weight: 600; padding: 1px 6px; border-radius: 6px; }
  .item-meta .qty.out { color: var(--out); background: var(--out-soft); }
  .item-meta .qty.low { color: var(--low); background: var(--low-soft); }
  .item-meta .qty.ok  { color: var(--ok);  background: var(--ok-soft); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 999px; vertical-align: middle; text-transform: uppercase;
    letter-spacing: 0.5px; flex-shrink: 0;
  }
  .badge.out { background: var(--out-soft); color: var(--out); }
  .badge.low { background: var(--low-soft); color: var(--low); }
  .badge.ok  { background: var(--ok-soft);  color: var(--ok); }

  .load-more {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px; margin: 12px 0 8px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px; color: var(--text-dim);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; animation: fadeIn 0.25s ease;
  }
  .load-more:hover { background: var(--surface-2); color: var(--text); border-color: var(--accent); }
  .load-more:active { transform: scale(0.98); }
  .load-more svg { width: 16px; height: 16px; }
  .load-more-count { color: var(--text-faint); font-weight: 500; font-size: 13px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty svg { width: 56px; height: 56px; margin-bottom: 14px; opacity: 0.4; }
  .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty p { font-size: 14px; }
  
  .fab {
    position: fixed; bottom: 22px; right: 22px; width: 58px; height: 58px; border-radius: 18px;
    background: var(--accent); color: white; border: none; cursor: pointer;
    box-shadow: var(--shadow), 0 0 0 1px rgba(124,131,255,0.3);
    display: grid; place-items: center; transition: transform 0.15s; z-index: 20;
  }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 26px; height: 26px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50;
    display: none; justify-content: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s; }

  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 60;
    display: none; justify-content: center; align-items: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .confirm-overlay.open { display: flex; animation: fadeIn 0.15s; }
  .confirm-dialog {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px; width: 90%; max-width: 380px; box-shadow: var(--shadow);
    animation: popIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  .confirm-dialog h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .confirm-dialog p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.5; }
  .confirm-dialog .actions { display: flex; gap: 10px; margin-top: 0; }

  .sheet {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    max-height: 92vh;
    overflow-y: auto;
    animation: popIn 0.25s cubic-bezier(0.2,0.8,0.2,1);
  }
  
  @media (max-width: 639px) {
    .overlay.open { align-items: flex-start; }
    .sheet {
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      border-radius: 0;
      padding: 18px;
      padding-top: calc(18px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
  }
  
  @media (min-width: 640px) {
    .overlay.open { align-items: center; }
  }
  
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .sheet h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 4px 8px; }
  
  .name-field { margin-bottom: 14px; }
  
  .image-qty-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
    align-items: start;
  }
  
  .image-column {
    display: flex;
    flex-direction: column;
  }
  
  .image-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface-2);
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .image-container img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    display: none;
  }
  .image-container img.loaded { display: block; }
  .image-placeholder { color: var(--text-faint); font-size: 13px; text-align: center; padding: 20px; }
  .image-placeholder svg { width: 48px; height: 48px; margin-bottom: 8px; opacity: 0.5; }
  
  .qty-fields-column {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .compact-field {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .compact-field label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .compact-field input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
    flex: 1;
  }
  .compact-field input:focus { border-color: var(--accent); }
  
  .details-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .field input, .field select {
    width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  
  .details-row .field { margin-bottom: 0; }
  
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }
  .btn-danger { background: var(--out-soft); color: var(--out); border-color: rgba(255,77,94,0.3); }
  
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); color: var(--text); padding: 10px 18px;
    border-radius: 999px; border: 1px solid var(--border); font-size: 14px;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .last-updated { text-align: center; font-size: 11px; color: var(--text-faint); padding: 8px; margin-top: 4px; }
  @media (min-width: 640px) {
    main { max-width: 720px; margin: 0 auto; padding: 16px 24px; }
    header { padding: 16px 24px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-row"><h1>🧰 Equipment</h1></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="search" placeholder="Search equipment..." />
    </div>
    <div class="filters-row">
      <div class="filter-select-wrapper">
        <select class="filter-select" id="categorySelect"><option value="">All categories</option></select>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="filter-select-wrapper">
        <select class="filter-select" id="limitSelect">
          <option value="10">Show 10</option>
          <option value="20" selected>Show 20</option>
          <option value="50">Show 50</option>
          <option value="100">Show 100</option>
          <option value="1000">Show 1000</option>
          <option value="all">Show all</option>
        </select>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</header>

<main><div id="list"></div></main>

<button class="fab" id="addBtn" aria-label="Add item">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Add/Edit Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>
      <span id="sheetTitle">Add equipment</span>
      <button class="close-btn" id="closeSheet">×</button>
    </h2>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      
      <!-- Row 1: Name (full width) -->
      <div class="name-field">
        <div class="field">
          <label for="itemName">Name</label>
          <input type="text" id="itemName" required placeholder="e.g. Safety gloves" />
        </div>
      </div>
      
      <!-- Row 2: Image (2/3 left) + Qty/Min/Unit (1/3 right) -->
      <div class="image-qty-row">
        <div class="image-column">
          <div class="image-container" id="imageContainer">
            <img id="itemImageDisplay" alt="Equipment image" />
            <div class="image-placeholder" id="imagePlaceholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <div>No image</div>
            </div>
          </div>
          <input type="hidden" id="itemImageFile" />
        </div>
        
        <div class="qty-fields-column">
          <div class="compact-field">
            <label for="itemQty">Qty</label>
            <input type="number" id="itemQty" min="0" value="0" required />
          </div>
          <div class="compact-field">
            <label for="itemMin">Min</label>
            <input type="number" id="itemMin" min="0" value="5" required />
          </div>
          <div class="compact-field">
            <label for="itemUnit">Unit</label>
            <input type="text" id="itemUnit" placeholder="pcs" />
          </div>
        </div>
      </div>
      
      <!-- Row 3: Category + Location -->
      <div class="details-row">
        <div class="field">
          <label for="itemCategory">Category</label>
          <input type="text" id="itemCategory" placeholder="PPE, Tools..." />
        </div>
        <div class="field">
          <label for="itemLocation">Location</label>
          <input type="text" id="itemLocation" placeholder="Shelf A3..." />
        </div>
      </div>
      
      <!-- Row 4: Action buttons -->
      <div class="actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none">Delete</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Custom Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 id="confirmTitle">Confirm</h3>
    <p id="confirmMessage">Are you sure?</p>
    <div class="actions">
      <button type="button" class="btn btn-secondary" id="confirmCancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyqZbjadwHaUfqiAc7e-GL-NvrclpwcMERM-EtSNLQvL-yGZbmRjLaG_Rh7KL3aEfrgMg/exec';
  const CACHE_KEY = 'equipment_cache_v2';
  const CACHE_MAX_AGE = 24 * 60 * 60 * 1000;
  const SEARCH_DEBOUNCE_MS = 300;
  const DEFAULT_LIMIT = 20;
  const IMAGE_BASE_URL = 'https://kintane.github.io/Inventory-app/';

  let items = [];
  let currentCategory = '';
  let currentSearch = '';
  let currentLimit = DEFAULT_LIMIT;
  let displayLimit = DEFAULT_LIMIT;
  let lastUpdateTime = null;
  let nextRowNumber = 2;
  let searchDebounceTimer = null;

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const overlay = $('overlay');
  const sheet = overlay.querySelector('.sheet');
  const categorySelect = $('categorySelect');
  const limitSelect = $('limitSelect');
  const confirmOverlay = $('confirmOverlay');

  let isModalOpen = false;
  let isConfirmOpen = false;
  let confirmResolver = null;

  function showConfirm(title, message, okLabel = 'Delete') {
    return new Promise((resolve) => {
      $('confirmTitle').textContent = title;
      $('confirmMessage').textContent = message;
      $('confirmOk').textContent = okLabel;
      confirmResolver = resolve;
      history.pushState({ confirmModal: true }, '');
      isConfirmOpen = true;
      confirmOverlay.classList.add('open');
    });
  }

  function closeConfirmInternal(result) {
    confirmOverlay.classList.remove('open');
    isConfirmOpen = false;
    if (confirmResolver) { confirmResolver(result); confirmResolver = null; }
  }

  function closeConfirm(result) {
    if (isConfirmOpen) {
      if (history.state && history.state.confirmModal) history.back();
      else closeConfirmInternal(result !== undefined ? result : false);
    }
  }

  function closeSheetInternal() {
    overlay.classList.remove('open');
    isModalOpen = false;
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  }

  function closeSheet() {
    if (isModalOpen) {
      if (history.state && history.state.modal) history.back();
      else closeSheetInternal();
    }
  }

  window.addEventListener('popstate', (e) => {
    if (isConfirmOpen) { closeConfirmInternal(false); return; }
    if (isModalOpen) {
      const active = document.activeElement;
      const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
      if (isInput) { active.blur(); closeSheetInternal(); }
      else { closeSheetInternal(); }
    }
  });

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  function saveCache(itemsToCache, timestamp) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ items: itemsToCache, timestamp: timestamp || Date.now() }));
    } catch (e) { console.warn('Cache save failed:', e); }
  }

  function formatTimeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  async function parseResponse(response) {
    const text = await response.text();
    try { return JSON.parse(text); } catch (e) { throw new Error('Invalid response'); }
  }

  async function fetchFromSheets() {
    const response = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await parseResponse(response);
    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error('Invalid data');
    return data.map(item => ({ id: 'row_' + item.rowNumber, ...item }));
  }

  async function postToSheets(payload) {
    const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await parseResponse(response);
    if (!result.success) throw new Error(result.message || 'Failed');
    return result;
  }

  async function loadAll(silent = false, force = false) {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }

    if (!force && cached && cached.timestamp && (Date.now() - cached.timestamp) < CACHE_MAX_AGE) {
      return;
    }

    try {
      const freshItems = await fetchFromSheets();
      items = freshItems;
      lastUpdateTime = Date.now();
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      saveCache(items, lastUpdateTime);
      render();
      if (!silent) toast('Data refreshed');
    } catch (err) {
      console.error('Background fetch failed:', err);
      if (items.length === 0 && !silent) toast('Could not load: ' + err.message);
    }
  }

  async function addItem(data) {
    const newItem = { id: 'row_' + nextRowNumber, rowNumber: nextRowNumber, ...data };
    items.push(newItem);
    nextRowNumber++;
    saveCache(items);
    render();
    toast('Added');
    try { await postToSheets({ action: 'add', ...data }); } 
    catch (err) { console.error('Sync failed:', err); toast('Sync failed (saved locally)'); }
  }

  async function updateItem(item, data) {
    const original = { ...item };
    Object.assign(item, data);
    saveCache(items);
    render();
    toast('Updated');
    try { await postToSheets({ action: 'update', row: item.rowNumber, ...data }); } 
    catch (err) {
      console.error('Sync failed:', err);
      Object.assign(item, original);
      saveCache(items);
      render();
      toast('Save failed');
    }
  }

  async function deleteItem(item) {
    const originalItems = [...items];
    items = items.filter(i => i.id !== item.id);
    saveCache(items);
    render();
    toast('Deleted');
    try { await postToSheets({ action: 'delete', row: item.rowNumber }); } 
    catch (err) {
      console.error('Sync failed:', err);
      items = originalItems;
      saveCache(items);
      render();
      toast('Delete failed');
    }
  }

  function statusOf(item) {
    if (item.qty <= 0) return 'out';
    if (item.qty <= item.min) return 'low';
    return 'ok';
  }
  function statusLabel(s) { return s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'OK'; }

  function getCategories() {
    const cats = new Set();
    items.forEach(it => { if (it.category && it.category.trim() !== '') cats.add(it.category.trim()); });
    return Array.from(cats).sort((a, b) => a.localeCompare(b));
  }

  function updateCategoryDropdown() {
    const categories = getCategories();
    const currentValue = categorySelect.value;
    categorySelect.innerHTML = '';
    const allOption = document.createElement('option');
    allOption.value = ''; allOption.textContent = 'All categories';
    categorySelect.appendChild(allOption);
    categories.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat; option.textContent = cat;
      categorySelect.appendChild(option);
    });
    if (currentValue && categories.includes(currentValue)) categorySelect.value = currentValue;
    else { categorySelect.value = ''; currentCategory = ''; }
    categorySelect.classList.toggle('empty', categories.length === 0);
  }

  function getFilteredList() {
    const q = currentSearch.trim().toLowerCase();
    let filtered = items.filter(it => {
      if (currentCategory && (it.category || '').trim() !== currentCategory) return false;
      if (!q) return true;
      return (it.name + ' ' + (it.category||'') + ' ' + (it.location||'')).toLowerCase().includes(q);
    });
    const order = { out: 0, low: 1, ok: 2 };
    filtered.sort((a,b) => {
      const sa = order[statusOf(a)], sb = order[statusOf(b)];
      if (sa !== sb) return sa - sb;
      return (a.name || '').toString().localeCompare((b.name || '').toString());
    });
    return filtered;
  }

  function render() {
    items = items.filter(item => item && item.name && item.name.trim() !== '');
    updateCategoryDropdown();
    const filtered = getFilteredList();
    const totalFiltered = filtered.length;
    const isUnlimited = currentLimit === 'all';
    const visibleItems = isUnlimited ? filtered : filtered.slice(0, displayLimit);
    const hasMore = !isUnlimited && totalFiltered > displayLimit;
    const remaining = totalFiltered - displayLimit;

    let html = '';
    if (totalFiltered === 0) {
      let emptyTitle = 'No equipment yet', emptyMsg = 'Tap + to add your first item';
      if (items.length > 0) {
        if (currentCategory && currentSearch) { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search or category.'; }
        else if (currentCategory) { emptyTitle = 'No items in this category'; emptyMsg = 'Try selecting a different category.'; }
        else { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search.'; }
      }
      html = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <path d="M3.3 7 12 12l8.7-5M12 22V12"/>
        </svg>
        <h3>${emptyTitle}</h3><p>${emptyMsg}</p>
      </div>`;
    } else {
      html = visibleItems.map(it => {
        const s = statusOf(it);
        const unit = it.unit ? ` ${it.unit}` : '';
        const metaParts = [];
        metaParts.push(`<span class="qty ${s}">${it.qty}/${it.min}${unit}</span>`);
        if (it.category) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.category)}</span>`);
        if (it.location) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.location)}</span>`);
        return `<div class="item status-${s}" data-id="${it.id}">
          <div class="item-name">
            <span class="item-name-text">${escapeHtml(it.name)}</span>
            <span class="badge ${s}">${statusLabel(s)}</span>
          </div>
          <div class="item-meta">${metaParts.join('')}</div>
        </div>`;
      }).join('');

      if (hasMore) {
        html += `<button class="load-more" id="loadMoreBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span>Load more</span>
          <span class="load-more-count">(${remaining} remaining)</span>
        </button>`;
      }
    }

    if (lastUpdateTime) html += `<div class="last-updated">Last updated: ${formatTimeAgo(lastUpdateTime)}</div>`;
    listEl.innerHTML = html;

    const loadMoreBtn = $('loadMoreBtn');
    if (loadMoreBtn) loadMoreBtn.addEventListener('click', handleLoadMore);
  }

  function handleLoadMore() {
    displayLimit += currentLimit;
    render();
    requestAnimationFrame(() => {
      const newBtn = $('loadMoreBtn');
      if (newBtn) newBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  listEl.addEventListener('click', e => {
    const itemEl = e.target.closest('.item');
    if (!itemEl) return;
    const item = items.find(i => i.id === itemEl.dataset.id);
    if (!item) return;
    openEdit(item);
  });

  categorySelect.addEventListener('change', e => { currentCategory = e.target.value; displayLimit = currentLimit === 'all' ? Infinity : currentLimit; render(); });
  limitSelect.addEventListener('change', e => {
    const val = e.target.value;
    currentLimit = val === 'all' ? 'all' : parseInt(val, 10);
    displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
    render();
  });
  $('search').addEventListener('input', e => {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      currentSearch = e.target.value;
      displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
      render();
    }, SEARCH_DEBOUNCE_MS);
  });

  $('addBtn').addEventListener('click', () => openEdit(null));
  $('closeSheet').addEventListener('click', closeSheet);
  $('cancelBtn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  function loadImage(imageName) {
    const img = $('itemImageDisplay');
    const placeholder = $('imagePlaceholder');
    
    if (!imageName || imageName.trim() === '') {
      img.classList.remove('loaded');
      placeholder.style.display = 'block';
      return;
    }
    
    const imageUrl = IMAGE_BASE_URL + imageName.trim();
    img.src = imageUrl;
    
    img.onload = () => {
      img.classList.add('loaded');
      placeholder.style.display = 'none';
    };
    
    img.onerror = () => {
      img.classList.remove('loaded');
      placeholder.style.display = 'block';
    };
  }

  function openEdit(item) {
    $('sheetTitle').textContent = item ? 'Edit equipment' : 'Add equipment';
    $('itemId').value = item ? item.id : '';
    $('itemName').value = item ? item.name : '';
    $('itemQty').value = item ? item.qty : 0;
    $('itemMin').value = item ? item.min : 5;
    $('itemUnit').value = item ? (item.unit || '') : '';
    $('itemCategory').value = item ? (item.category || '') : '';
    $('itemLocation').value = item ? (item.location || '') : '';
    $('itemImageFile').value = item ? (item.image || '') : '';
    $('deleteBtn').style.display = item ? 'block' : 'none';
    
    loadImage(item ? item.image : '');
    
    sheet.scrollTop = 0;
    history.pushState({ modal: true }, '');
    isModalOpen = true;
    overlay.classList.add('open');
    setTimeout(() => $('itemName').focus(), 200);
  }

  $('itemForm').addEventListener('submit', e => {
    e.preventDefault();
    const id = $('itemId').value;
    const data = {
      name: $('itemName').value.trim(),
      qty: Math.max(0, parseInt($('itemQty').value) || 0),
      min: Math.max(0, parseInt($('itemMin').value) || 0),
      unit: $('itemUnit').value.trim(),
      category: $('itemCategory').value.trim(),
      location: $('itemLocation').value.trim(),
      image: $('itemImageFile').value.trim()
    };
    if (!data.name) return;
    
    if (isModalOpen && history.state && history.state.modal) history.back();
    else closeSheetInternal();

    if (id && id.startsWith('row_')) updateItem(items.find(i => i.id === id), data);
    else addItem(data);
  });

  $('deleteBtn').addEventListener('click', async () => {
    const id = $('itemId').value;
    if (!id || !id.startsWith('row_')) return;
    const item = items.find(i => i.id === id);
    const confirmed = await showConfirm('Delete item?', `"${item ? item.name : 'This item'}" will be permanently removed.`, 'Delete');
    if (confirmed) { closeSheet(); deleteItem(item); }
  });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function init() {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }
    setTimeout(() => {
      loadAll(true, true).catch(err => console.error('Initial background fetch failed:', err));
    }, 300);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const cached = loadCache();
      const age = cached && cached.timestamp ? Date.now() - cached.timestamp : Infinity;
      if (age > 5 * 60 * 1000) {
        loadAll(true, true).catch(err => console.error('Visibility refresh failed:', err));
      }
    }
  });

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) loadAll(true, true).catch(err => console.error('Pageshow refresh failed:', err));
  });

  init();
})();
</script>
</body>
</html>
