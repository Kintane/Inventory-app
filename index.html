<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="referrer" content="no-referrer" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<title>Equipment Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #09090b;
    --surface: #18181b;
    --surface-2: #27272a;
    --border: #27272a;
    --text: #fafafa;
    --text-dim: #a1a1aa;
    --text-faint: #52525b;
    --accent: #818cf8;
    --accent-glow: rgba(129, 140, 248, 0.15);
    --ok: #34d399;
    --ok-soft: rgba(52, 211, 153, 0.1);
    --low: #fbbf24;
    --low-soft: rgba(251, 191, 36, 0.1);
    --out: #f87171;
    --out-soft: rgba(248, 113, 113, 0.1);
  }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior-y: auto;
  }

  body {
    background-color: var(--bg);
    background-image: 
      radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
    color: var(--text);
    padding-bottom: 100px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(9, 9, 11, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }
  .header-content { max-width: 720px; margin: 0 auto; }
  .title-row { display: flex; align-items: center; margin-bottom: 16px; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Search */
  .search { position: relative; margin-bottom: 12px; }
  .search input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }
  .search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--bg);
  }
  .search svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-faint);
    transition: color 0.2s;
    pointer-events: none;
  }
  .search input:focus ~ svg { color: var(--accent); }

  /* Filters */
  .filters-row { display: flex; gap: 10px; }
  .filter-select-wrapper { position: relative; flex: 1; }
  .filter-select-wrapper svg {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--text-faint);
    pointer-events: none;
  }
  .filter-select {
    width: 100%;
    padding: 10px 32px 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    transition: all 0.2s;
  }
  .filter-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .filter-select option { background: var(--surface); color: var(--text); }
  .filter-select.empty { color: var(--text-faint); }

  /* Main List */
  main { padding: 16px; max-width: 720px; margin: 0 auto; }
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .item:hover {
    transform: translateY(-2px);
    border-color: var(--text-faint);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .item:active { transform: scale(0.98); }
  .item.status-out { border-left-color: var(--out); }
  .item.status-low  { border-left-color: var(--low); }
  .item.status-ok   { border-left-color: var(--ok); }

  .item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .item-name-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .item-meta .sep { color: var(--text-faint); }
  .item-meta .qty {
    font-weight: 600;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 6px;
    letter-spacing: 0.3px;
  }
  .item-meta .qty.out { color: var(--out); background: var(--out-soft); }
  .item-meta .qty.low { color: var(--low); background: var(--low-soft); }
  .item-meta .qty.ok  { color: var(--ok);  background: var(--ok-soft); }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge.out { background: var(--out-soft); color: var(--out); }
  .badge.low { background: var(--low-soft); color: var(--low); }
  .badge.ok  { background: var(--ok-soft);  color: var(--ok); }

  /* Load More */
  .load-more {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    margin: 16px 0 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .load-more:hover {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--accent);
  }
  .load-more:active { transform: scale(0.98); }
  .load-more svg { width: 16px; height: 16px; }
  .load-more-count { color: var(--text-faint); font-weight: 500; font-size: 13px; }

  /* Empty State */
  .empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; color: var(--text-faint); }
  .empty h3 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .empty p { font-size: 14px; line-height: 1.5; }
  .last-updated { text-align: center; font-size: 12px; color: var(--text-faint); padding: 16px; margin-top: 8px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
    display: grid;
    place-items: center;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: 20;
  }
  .fab:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5), 0 0 0 1px rgba(255,255,255,0.2);
  }
  .fab:active { transform: scale(0.95); }
  .fab svg { width: 24px; height: 24px; }

  /* Overlay & Sheet */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 50;
    display: none;
    justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s ease; }
  
  .sheet {
    width: 100%;
    max-width: 600px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  @media (max-width: 639px) {
    .overlay.open { align-items: flex-end; }
    .sheet {
      max-height: 95vh;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    }
  }
  @media (min-width: 640px) { .overlay.open { align-items: center; } }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  @media (min-width: 640px) { .sheet-handle { display: none; } }

  .sheet h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text);
  }
  .close-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    font-size: 20px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s;
  }
  .close-btn:hover { background: var(--border); color: var(--text); }

  /* Form Fields */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--surface);
  }
  .details-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Image & Qty Layout */
  .image-qty-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  @media (min-width: 640px) {
    .image-qty-row { grid-template-columns: 2fr 1fr; }
  }

  .image-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg);
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.2s;
  }
  .image-container:hover { border-color: var(--accent); background: var(--accent-glow); }
  .image-container img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .image-container img.loaded { display: block; }
  
  .image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-faint);
    font-size: 13px;
    pointer-events: none;
  }
  .image-placeholder svg { width: 40px; height: 40px; opacity: 0.5; }

  .image-buttons { display: flex; gap: 8px; margin-top: 10px; }
  .image-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .image-btn:hover { background: var(--surface); border-color: var(--text-faint); color: var(--text); }
  .image-btn.delete-btn { color: var(--out); border-color: rgba(248, 113, 113, 0.2); }
  .image-btn.delete-btn:hover { background: var(--out-soft); border-color: var(--out); }
  .image-btn.delete-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .image-btn svg { width: 16px; height: 16px; }
  .image-btn.uploading { opacity: 0.7; cursor: wait; }

  .qty-fields-column {
    display: grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap: 8px;
    background: var(--surface);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    align-items: flex-end;
  }
  @media (min-width: 640px) {
    .qty-fields-column { grid-template-columns: 1fr; gap: 12px; }
  }
  .compact-field { display: flex; flex-direction: column; }
  .compact-field label {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
  }
  .compact-field input {
    width: 100%;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    text-align: center;
    outline: none;
    transition: all 0.2s;
  }
  .compact-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  /* Actions & Buttons */
  .actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  
  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  
  .btn-danger {
    background: var(--out-soft);
    color: var(--out);
    border-color: rgba(248, 113, 113, 0.3);
  }
  .btn-danger:hover { background: rgba(248, 113, 113, 0.2); border-color: var(--out); }

  /* Confirm Dialog */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 60;
    display: none;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .confirm-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
  .confirm-dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    animation: popIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .confirm-dialog h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .confirm-dialog p { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }
  .confirm-dialog .actions { margin-top: 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(39, 39, 42, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #imageFileInput { display: none; }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-row"><h1>🧰 Equipment</h1></div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="search" placeholder="Search equipment..." />
    </div>
    <div class="filters-row">
      <div class="filter-select-wrapper">
        <select class="filter-select" id="categorySelect"><option value="">All categories</option></select>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="filter-select-wrapper">
        <select class="filter-select" id="limitSelect">
          <option value="10">Show 10</option>
          <option value="20" selected>Show 20</option>
          <option value="50">Show 50</option>
          <option value="100">Show 100</option>
          <option value="1000">Show 1000</option>
          <option value="all">Show all</option>
        </select>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</header>

<main><div id="list"></div></main>

<button class="fab" id="addBtn" aria-label="Add item">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<!-- Add/Edit Sheet -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>
      <span id="sheetTitle">Add equipment</span>
      <button class="close-btn" id="closeSheet" aria-label="Close">×</button>
    </h2>
    <form id="itemForm">
      <input type="hidden" id="itemId" />

      <div class="field">
        <label for="itemName">Name</label>
        <input type="text" id="itemName" required placeholder="e.g. Safety gloves" />
      </div>

      <div class="image-qty-row">
        <div class="image-column">
          <div class="image-container" id="imageContainer">
            <img id="itemImageDisplay" alt="Equipment image" />
            <div class="image-placeholder" id="imagePlaceholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>No image</span>
            </div>
          </div>
          <div class="image-buttons">
            <button type="button" class="image-btn" id="uploadBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span>Upload</span>
            </button>
            <button type="button" class="image-btn delete-btn" id="deleteImageBtn" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
              <span>Delete</span>
            </button>
          </div>
          <input type="file" id="imageFileInput" accept="image/*" />
          <input type="hidden" id="itemImageFile" />
        </div>

        <div class="qty-fields-column">
          <div class="compact-field">
            <label for="itemQty">Qty</label>
            <input type="number" id="itemQty" min="0" value="0" required />
          </div>
          <div class="compact-field">
            <label for="itemMin">Min</label>
            <input type="number" id="itemMin" min="0" value="5" required />
          </div>
          <div class="compact-field">
            <label for="itemUnit">Unit</label>
            <input type="text" id="itemUnit" placeholder="pcs" />
          </div>
        </div>
      </div>

      <div class="details-row">
        <div class="field">
          <label for="itemCategory">Category</label>
          <input type="text" id="itemCategory" placeholder="PPE, Tools..." />
        </div>
        <div class="field">
          <label for="itemLocation">Location</label>
          <input type="text" id="itemLocation" placeholder="Shelf A3..." />
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Delete
        </button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Custom Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <h3 id="confirmTitle">Confirm</h3>
    <p id="confirmMessage">Are you sure?</p>
    <div class="actions">
      <button type="button" class="btn btn-secondary" id="confirmCancel">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv8wsAQDDdYHPh2xoodc90Brt7gFW3J-lg5_ma_krKeKQMI-G5X2_u-b2QVeaj_EQWuw/exec';
  const CACHE_KEY = 'equipment_cache_v2';
  const CACHE_MAX_AGE = 24 * 60 * 60 * 1000;
  const SEARCH_DEBOUNCE_MS = 300;
  const DEFAULT_LIMIT = 20;

  let items = [];
  let currentCategory = '';
  let currentSearch = '';
  let currentLimit = DEFAULT_LIMIT;
  let displayLimit = DEFAULT_LIMIT;
  let lastUpdateTime = null;
  let nextRowNumber = 2;
  let searchDebounceTimer = null;

  let pendingImageUpload = null;
  let activeImageUploadId = 0;
  let currentLocalImageUrl = null;

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const overlay = $('overlay');
  const sheet = overlay.querySelector('.sheet');
  const categorySelect = $('categorySelect');
  const limitSelect = $('limitSelect');
  const confirmOverlay = $('confirmOverlay');

  let isModalOpen = false;
  let isConfirmOpen = false;
  let confirmResolver = null;

  function showConfirm(title, message, okLabel = 'Delete') {
    return new Promise((resolve) => {
      $('confirmTitle').textContent = title;
      $('confirmMessage').textContent = message;
      $('confirmOk').textContent = okLabel;
      confirmResolver = resolve;
      history.pushState({ confirmModal: true }, '');
      isConfirmOpen = true;
      confirmOverlay.classList.add('open');
    });
  }

  function closeConfirmInternal(result) {
    confirmOverlay.classList.remove('open');
    isConfirmOpen = false;
    if (confirmResolver) { 
      confirmResolver(result); 
      confirmResolver = null; 
    }
  }

  function closeConfirm(result) {
    if (!isConfirmOpen) return;
    if (history.state && history.state.confirmModal) {
      history.replaceState(null, '');
    }
    closeConfirmInternal(result !== undefined ? result : false);
  }

  function closeSheetInternal() {
    overlay.classList.remove('open');
    isModalOpen = false;
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  }

  function closeSheet() {
    if (isModalOpen) {
      if (history.state && history.state.modal) history.back();
      else closeSheetInternal();
    }
  }

  window.addEventListener('popstate', (e) => {
    if (isConfirmOpen) { 
      closeConfirmInternal(false); 
      return; 
    }
    if (isModalOpen) {
      const active = document.activeElement;
      const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
      if (isInput) { active.blur(); closeSheetInternal(); }
      else { closeSheetInternal(); }
    }
  });

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  function saveCache(itemsToCache, timestamp) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ items: itemsToCache, timestamp: timestamp || Date.now() }));
    } catch (e) { console.warn('Cache save failed:', e); }
  }

  function formatTimeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  async function parseResponse(response) {
    const text = await response.text();
    try { return JSON.parse(text); } catch (e) { throw new Error('Invalid response'); }
  }

  async function fetchFromSheets() {
    const response = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await parseResponse(response);
    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error('Invalid data');
    return data.map(item => ({ id: 'row_' + item.rowNumber, ...item }));
  }

  async function postToSheets(payload) {
    const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await parseResponse(response);
    if (!result.success) throw new Error(result.message || 'Failed');
    return result;
  }

  async function compressImage(file, maxWidth = 1200, quality = 0.8) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(compressedDataUrl);
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  }

  async function uploadImageToDrive(file) {
    try {
      const compressedData = await compressImage(file, 481, 0.8);
      const result = await postToSheets({
        action: 'uploadImage',
        imageData: compressedData,
        filename: file.name.replace(/\.[^/.]+$/, "") + ".jpg"
      });
      return result.url;
    } catch (err) {
      throw err;
    }
  }

  async function deleteImageFromDrive(imageUrl) {
    try {
      const result = await postToSheets({
        action: 'deleteImage',
        imageUrl: imageUrl
      });
      return result.success;
    } catch (err) {
      console.error('Delete image failed:', err);
      throw err;
    }
  }

  async function loadAll(silent = false, force = false) {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }

    if (!force && cached && cached.timestamp && (Date.now() - cached.timestamp) < CACHE_MAX_AGE) {
      return;
    }

    try {
      const freshItems = await fetchFromSheets();
      items = freshItems;
      lastUpdateTime = Date.now();
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      saveCache(items, lastUpdateTime);
      render();
      if (!silent) toast('Data refreshed');
    } catch (err) {
      console.error('Background fetch failed:', err);
      if (items.length === 0 && !silent) toast('Could not load: ' + err.message);
    }
  }

  async function addItem(data) {
    const newItem = { id: 'row_' + nextRowNumber, rowNumber: nextRowNumber, ...data };
    items.push(newItem);
    nextRowNumber++;
    saveCache(items);
    render();
    toast('Added');
    try { await postToSheets({ action: 'add', ...data }); } 
    catch (err) { console.error('Sync failed:', err); toast('Sync failed (saved locally)'); }
  }

  async function updateItem(item, data) {
    const original = { ...item };
    Object.assign(item, data);
    saveCache(items);
    render();
    toast('Updated');
    try { await postToSheets({ action: 'update', row: item.rowNumber, ...data }); } 
    catch (err) {
      console.error('Sync failed:', err);
      Object.assign(item, original);
      saveCache(items);
      render();
      toast('Save failed');
    }
  }

  async function deleteItem(item) {
    const originalItems = [...items];
    if (item.image && item.image.trim() !== '') {
      try { await deleteImageFromDrive(item.image); } 
      catch (err) { console.error('Failed to delete image from Drive:', err); }
    }
    items = items.filter(i => i.id !== item.id);
    saveCache(items);
    render();
    toast('Deleted');
    try { await postToSheets({ action: 'delete', row: item.rowNumber }); } 
    catch (err) {
      console.error('Sync failed:', err);
      items = originalItems;
      saveCache(items);
      render();
      toast('Delete failed');
    }
  }

  function statusOf(item) {
    if (item.qty <= 0) return 'out';
    if (item.qty <= item.min) return 'low';
    return 'ok';
  }
  function statusLabel(s) { return s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'OK'; }

  function getCategories() {
    const cats = new Set();
    items.forEach(it => { if (it.category && it.category.trim() !== '') cats.add(it.category.trim()); });
    return Array.from(cats).sort((a, b) => a.localeCompare(b));
  }

  function updateCategoryDropdown() {
    const categories = getCategories();
    const currentValue = categorySelect.value;
    categorySelect.innerHTML = '';
    const allOption = document.createElement('option');
    allOption.value = ''; allOption.textContent = 'All categories';
    categorySelect.appendChild(allOption);
    categories.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat; option.textContent = cat;
      categorySelect.appendChild(option);
    });
    if (currentValue && categories.includes(currentValue)) categorySelect.value = currentValue;
    else { categorySelect.value = ''; currentCategory = ''; }
    categorySelect.classList.toggle('empty', categories.length === 0);
  }

  function getFilteredList() {
    const q = currentSearch.trim().toLowerCase();
    let filtered = items.filter(it => {
      if (currentCategory && (it.category || '').trim() !== currentCategory) return false;
      if (!q) return true;
      return (it.name + ' ' + (it.category||'') + ' ' + (it.location||'')).toLowerCase().includes(q);
    });
    const order = { out: 0, low: 1, ok: 2 };
    filtered.sort((a,b) => {
      const sa = order[statusOf(a)], sb = order[statusOf(b)];
      if (sa !== sb) return sa - sb;
      return (a.name || '').toString().localeCompare((b.name || '').toString());
    });
    return filtered;
  }

  function render() {
    items = items.filter(item => item && item.name && item.name.trim() !== '');
    updateCategoryDropdown();
    const filtered = getFilteredList();
    const totalFiltered = filtered.length;
    const isUnlimited = currentLimit === 'all';
    const visibleItems = isUnlimited ? filtered : filtered.slice(0, displayLimit);
    const hasMore = !isUnlimited && totalFiltered > displayLimit;
    const remaining = totalFiltered - displayLimit;

    let html = '';
    if (totalFiltered === 0) {
      let emptyTitle = 'No equipment yet', emptyMsg = 'Tap + to add your first item';
      if (items.length > 0) {
        if (currentCategory && currentSearch) { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search or category.'; }
        else if (currentCategory) { emptyTitle = 'No items in this category'; emptyMsg = 'Try selecting a different category.'; }
        else { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search.'; }
      }
      html = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <path d="M3.3 7 12 12l8.7-5M12 22V12"/>
        </svg>
        <h3>${emptyTitle}</h3><p>${emptyMsg}</p>
      </div>`;
    } else {
      html = visibleItems.map(it => {
        const s = statusOf(it);
        const unit = it.unit ? ` ${it.unit}` : '';
        const metaParts = [];
        metaParts.push(`<span class="qty ${s}">${it.qty}/${it.min}${unit}</span>`);
        if (it.category) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.category)}</span>`);
        if (it.location) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.location)}</span>`);
        return `<div class="item status-${s}" data-id="${it.id}">
          <div class="item-name">
            <span class="item-name-text">${escapeHtml(it.name)}</span>
            <span class="badge ${s}">${statusLabel(s)}</span>
          </div>
          <div class="item-meta">${metaParts.join('')}</div>
        </div>`;
      }).join('');

      if (hasMore) {
        html += `<button class="load-more" id="loadMoreBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span>Load more</span>
          <span class="load-more-count">(${remaining} remaining)</span>
        </button>`;
      }
    }

    if (lastUpdateTime) html += `<div class="last-updated">Last updated: ${formatTimeAgo(lastUpdateTime)}</div>`;
    listEl.innerHTML = html;

    const loadMoreBtn = $('loadMoreBtn');
    if (loadMoreBtn) loadMoreBtn.addEventListener('click', handleLoadMore);
  }

  function handleLoadMore() {
    displayLimit += currentLimit;
    render();
    requestAnimationFrame(() => {
      const newBtn = $('loadMoreBtn');
      if (newBtn) newBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  listEl.addEventListener('click', e => {
    const itemEl = e.target.closest('.item');
    if (!itemEl) return;
    const item = items.find(i => i.id === itemEl.dataset.id);
    if (!item) return;
    openEdit(item);
  });

  categorySelect.addEventListener('change', e => { currentCategory = e.target.value; displayLimit = currentLimit === 'all' ? Infinity : currentLimit; render(); });
  limitSelect.addEventListener('change', e => {
    const val = e.target.value;
    currentLimit = val === 'all' ? 'all' : parseInt(val, 10);
    displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
    render();
  });
  $('search').addEventListener('input', e => {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      currentSearch = e.target.value;
      displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
      render();
    }, SEARCH_DEBOUNCE_MS);
  });

  $('addBtn').addEventListener('click', () => openEdit(null));
  $('closeSheet').addEventListener('click', closeSheet);
  $('cancelBtn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  $('uploadBtn').addEventListener('click', () => { $('imageFileInput').click(); });

  $('confirmCancel').addEventListener('click', () => closeConfirm(false));
  $('confirmOk').addEventListener('click', () => closeConfirm(true));
  confirmOverlay.addEventListener('click', e => {
    if (e.target === confirmOverlay) closeConfirm(false);
  });

  $('deleteImageBtn').addEventListener('click', async () => {
    const imageUrl = $('itemImageFile').value;
    activeImageUploadId++;
    pendingImageUpload = null;

    if (currentLocalImageUrl) {
      URL.revokeObjectURL(currentLocalImageUrl);
      currentLocalImageUrl = null;
    }

    if (!imageUrl || imageUrl.trim() === '') {
      const img = $('itemImageDisplay');
      const placeholder = $('imagePlaceholder');
      img.src = '';
      img.classList.remove('loaded');
      placeholder.style.display = 'flex';
      $('deleteImageBtn').disabled = true;
      return;
    }

    const confirmed = await showConfirm('Delete image?', 'This will delete the image from Google Drive and remove it from this item.', 'Delete Image');
    if (!confirmed) return;

    const deleteBtn = $('deleteImageBtn');
    const originalHtml = deleteBtn.innerHTML;

    try {
      deleteBtn.disabled = true;
      deleteBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; width:16px; height:16px;">
          <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        <span>Deleting...</span>
      `;

      await deleteImageFromDrive(imageUrl);

      $('itemImageFile').value = '';
      const img = $('itemImageDisplay');
      const placeholder = $('imagePlaceholder');
      img.src = '';
      img.classList.remove('loaded');
      placeholder.style.display = 'flex';

      const currentId = $('itemId').value;
      if (currentId && currentId.startsWith('row_')) {
        const item = items.find(i => i.id === currentId);
        if (item) {
          item.image = '';
          saveCache(items);
          render();
          await postToSheets({ action: 'update', row: item.rowNumber, image: '' });
        }
      }
      toast('Image deleted');
    } catch (err) {
      console.error('Delete image failed:', err);
      toast('Failed to delete image: ' + err.message);
    } finally {
      deleteBtn.disabled = false;
      deleteBtn.innerHTML = originalHtml;
    }
  });

  $('imageFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { toast('Please select an image file'); return; }

    activeImageUploadId++;
    const myUploadId = activeImageUploadId;

    if (currentLocalImageUrl) URL.revokeObjectURL(currentLocalImageUrl);
    currentLocalImageUrl = URL.createObjectURL(file);

    const img = $('itemImageDisplay');
    const placeholder = $('imagePlaceholder');
    img.src = currentLocalImageUrl;
    img.classList.add('loaded');
    placeholder.style.display = 'none';
    $('deleteImageBtn').disabled = false;

    const uploadBtn = $('uploadBtn');
    const originalText = uploadBtn.innerHTML;
    uploadBtn.classList.add('uploading');
    uploadBtn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; width:16px; height:16px;">
        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
      <span>Uploading...</span>
    `;

    pendingImageUpload = (async () => {
      try {
        const imageUrl = await uploadImageToDrive(file);
        if (myUploadId === activeImageUploadId) {
          $('itemImageFile').value = imageUrl;
          const currentId = $('itemId').value;
          
          if (currentId && currentId.startsWith('row_')) {
            const item = items.find(i => i.id === currentId);
            if (item) {
              item.image = imageUrl;
              saveCache(items);
              render();
              await postToSheets({ action: 'update', row: item.rowNumber, image: imageUrl });
              toast('Image saved');
            }
          } else {
            const name = $('itemName').value.trim();
            if (name) {
              const data = {
                name: name,
                qty: Math.max(0, parseInt($('itemQty').value) || 0),
                min: Math.max(0, parseInt($('itemMin').value) || 0),
                unit: $('itemUnit').value.trim(),
                category: $('itemCategory').value.trim(),
                location: $('itemLocation').value.trim(),
                image: imageUrl
              };
              const newItem = { id: 'row_' + nextRowNumber, rowNumber: nextRowNumber, ...data };
              items.push(newItem);
              nextRowNumber++;
              saveCache(items);
              render();
              $('itemId').value = newItem.id;
              $('deleteBtn').style.display = 'flex';
              await postToSheets({ action: 'add', ...data });
              toast('New item & image saved');
            } else {
              toast('Image uploaded (enter name & save item to keep)');
            }
          }
        }
      } catch (err) {
        console.error('Background upload failed:', err);
        if (myUploadId === activeImageUploadId) toast('Upload failed: ' + err.message);
      } finally {
        if (myUploadId === activeImageUploadId) {
          uploadBtn.classList.remove('uploading');
          uploadBtn.innerHTML = originalText;
          pendingImageUpload = null;
        }
      }
    })();
    $('imageFileInput').value = '';
  });

  function loadImage(imageUrl) {
    const img = $('itemImageDisplay');
    const placeholder = $('imagePlaceholder');
    const deleteBtn = $('deleteImageBtn');

    if (currentLocalImageUrl) {
      URL.revokeObjectURL(currentLocalImageUrl);
      currentLocalImageUrl = null;
    }

    img.src = '';
    img.classList.remove('loaded');
    placeholder.style.display = 'flex';

    if (!imageUrl || imageUrl.trim() === '') {
      deleteBtn.disabled = true;
      return;
    }

    deleteBtn.disabled = false;
    let finalUrl = imageUrl.trim();
    let fileId = null;

    const thumbnailMatch = finalUrl.match(/[?&]id=([^&]+)/);
    if (thumbnailMatch) fileId = thumbnailMatch[1];
    const ucMatch = finalUrl.match(/\/d\/([^\/\?]+)/);
    if (ucMatch) fileId = ucMatch[1];
    const lhMatch = finalUrl.match(/lh3\.googleusercontent\.com\/d\/([^\/\?=]+)/);
    if (lhMatch) fileId = lhMatch[1];

    if (fileId) finalUrl = 'https://lh3.googleusercontent.com/d/' + fileId + '=w1000';

    img.src = finalUrl;
    img.onload = () => { img.classList.add('loaded'); placeholder.style.display = 'none'; };
    img.onerror = () => {
      console.error('Failed to load image:', finalUrl);
      img.classList.remove('loaded');
      placeholder.style.display = 'flex';
    };
  }

  function openEdit(item) {
    $('sheetTitle').textContent = item ? 'Edit equipment' : 'Add equipment';
    $('itemId').value = item ? item.id : '';
    $('itemName').value = item ? item.name : '';
    $('itemQty').value = item ? item.qty : 0;
    $('itemMin').value = item ? item.min : 5;
    $('itemUnit').value = item ? (item.unit || '') : '';
    $('itemCategory').value = item ? (item.category || '') : '';
    $('itemLocation').value = item ? (item.location || '') : '';
    $('itemImageFile').value = item ? (item.image || '') : '';
    $('deleteBtn').style.display = item ? 'flex' : 'none';

    loadImage(item ? item.image : '');
    sheet.scrollTop = 0;
    history.pushState({ modal: true }, '');
    isModalOpen = true;
    overlay.classList.add('open');
    setTimeout(() => $('itemName').focus(), 200);
  }

  $('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (pendingImageUpload) {
      toast('Finishing image upload...');
      await pendingImageUpload;
    }

    const id = $('itemId').value;
    const data = {
      name: $('itemName').value.trim(),
      qty: Math.max(0, parseInt($('itemQty').value) || 0),
      min: Math.max(0, parseInt($('itemMin').value) || 0),
      unit: $('itemUnit').value.trim(),
      category: $('itemCategory').value.trim(),
      location: $('itemLocation').value.trim(),
      image: $('itemImageFile').value.trim()
    };
    if (!data.name) return;

    if (isModalOpen && history.state && history.state.modal) history.back();
    else closeSheetInternal();

    if (id && id.startsWith('row_')) {
      updateItem(items.find(i => i.id === id), data);
    } else {
      addItem(data);
    }
  });

  $('deleteBtn').addEventListener('click', async () => {
    const id = $('itemId').value;
    if (!id || !id.startsWith('row_')) return;
    const item = items.find(i => i.id === id);
    const confirmed = await showConfirm('Delete item?', `"${item ? item.name : 'This item'}" will be permanently removed along with its image.`, 'Delete');
    if (confirmed) { closeSheet(); deleteItem(item); }
  });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  function init() {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }
    setTimeout(() => {
      loadAll(true, true).catch(err => console.error('Initial background fetch failed:', err));
    }, 300);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const cached = loadCache();
      const age = cached && cached.timestamp ? Date.now() - cached.timestamp : Infinity;
      if (age > 5 * 60 * 1000) {
        loadAll(true, true).catch(err => console.error('Visibility refresh failed:', err));
      }
    }
  });

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) loadAll(true, true).catch(err => console.error('Pageshow refresh failed:', err));
  });

  init();
})();
</script>
</body>
</html>
