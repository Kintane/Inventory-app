<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0e" />
<title>Equipment Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b0b0e;
    --surface: #16161b;
    --surface-2: #1f1f26;
    --border: #2a2a33;
    --text: #ececf1;
    --text-dim: #9a9aa6;
    --text-faint: #6b6b76;
    --accent: #7c83ff;
    --accent-soft: rgba(124,131,255,0.15);
    --ok: #3ddc84;
    --ok-soft: rgba(61,220,132,0.12);
    --low: #ffaa33;
    --low-soft: rgba(255,170,51,0.12);
    --out: #ff4d5e;
    --out-soft: rgba(255,77,94,0.14);
    --shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }
  body { padding-bottom: 100px; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,11,14,0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-content { max-width: 720px; margin: 0 auto; }
  .title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; position: relative;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); display: grid; place-items: center;
    cursor: pointer; transition: background 0.15s;
  }
  .icon-btn:active { background: var(--surface-2); }
  .icon-btn svg { width: 20px; height: 20px; }
  .search { position: relative; margin-bottom: 10px; }
  .search input {
    width: 100%; padding: 11px 14px 11px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-faint);
  }
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 2px;
    justify-content: center;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 14px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .tab .count {
    font-size: 12px; color: var(--text-faint);
    background: var(--surface-2); padding: 1px 7px; border-radius: 999px;
  }
  .tab.active {
    background: var(--accent-soft); border-color: var(--accent);
    color: var(--accent);
  }
  .tab.active .count { background: transparent; color: var(--accent); }
  main { padding: 12px 16px; }
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform 0.1s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item:active { transform: scale(0.99); }
  .item.status-out { border-color: rgba(255,77,94,0.35); background: linear-gradient(180deg, var(--out-soft), var(--surface)); }
  .item.status-low  { border-color: rgba(255,170,51,0.3);  background: linear-gradient(180deg, var(--low-soft), var(--surface)); }
  .item-name {
    font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .item-name-text {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .item-meta .sep { color: var(--text-faint); }
  .item-meta .qty {
    font-weight: 600;
    padding: 1px 6px; border-radius: 6px;
  }
  .item-meta .qty.out { color: var(--out); background: var(--out-soft); }
  .item-meta .qty.low { color: var(--low); background: var(--low-soft); }
  .item-meta .qty.ok  { color: var(--ok);  background: var(--ok-soft); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 999px;
    vertical-align: middle; text-transform: uppercase; letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge.out { background: var(--out-soft); color: var(--out); }
  .badge.low { background: var(--low-soft); color: var(--low); }
  .badge.ok  { background: var(--ok-soft);  color: var(--ok); }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty svg { width: 56px; height: 56px; margin-bottom: 14px; opacity: 0.4; }
  .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty p { font-size: 14px; }
  .fab {
    position: fixed; bottom: 22px; right: 22px;
    width: 58px; height: 58px; border-radius: 18px;
    background: var(--accent); color: white;
    border: none; cursor: pointer;
    box-shadow: var(--shadow), 0 0 0 1px rgba(124,131,255,0.3);
    display: grid; place-items: center;
    transition: transform 0.15s;
    z-index: 20;
  }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 26px; height: 26px; }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    display: none;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s; }
  @media (max-width: 639px) {
    .overlay.open { align-items: flex-start; }
    .sheet {
      width: 100%; height: 100vh; height: 100dvh;
      max-height: 100vh; max-height: 100dvh;
      border-radius: 0;
      padding: 18px 18px 24px;
      padding-top: calc(18px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .sheet-handle { display: none; }
  }
  @media (min-width: 640px) {
    .overlay.open { align-items: flex-end; }
    .sheet {
      width: 100%; max-width: 520px;
      border-radius: 20px 20px 0 0;
      padding: 18px 18px 24px;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.2,0.8,0.2,1);
    }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 14px;
  }
  .sheet h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 24px; cursor: pointer; padding: 4px 8px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 13px; color: var(--text-dim);
    margin-bottom: 6px; font-weight: 500;
  }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }
  .btn-danger { background: var(--out-soft); color: var(--out); border-color: rgba(255,77,94,0.3); }
  .menu {
    position: absolute; top: 58px; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: var(--shadow);
    padding: 6px; min-width: 180px; display: none; z-index: 30;
  }
  .menu.open { display: block; animation: fadeIn 0.15s; }
  .menu button {
    display: block; width: 100%; text-align: left;
    padding: 10px 12px; background: none; border: none;
    color: var(--text); font-size: 14px; cursor: pointer;
    border-radius: 8px;
  }
  .menu button:active { background: var(--surface-2); }
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); color: var(--text);
    padding: 10px 18px; border-radius: 999px;
    border: 1px solid var(--border); font-size: 14px;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  @media (min-width: 640px) {
    main { max-width: 720px; margin: 0 auto; padding: 16px 24px; }
    header { padding: 16px 24px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-row">
      <h1>🧰 Equipment</h1>
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </button>
      <div class="menu" id="menu">
        <button id="reloadBtn">🔄 Refresh data</button>
      </div>
    </div>

    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="search" placeholder="Search equipment..." />
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="all">All <span class="count" id="count-all">0</span></button>
      <button class="tab" data-filter="out">Out <span class="count" id="count-out">0</span></button>
      <button class="tab" data-filter="low">Low <span class="count" id="count-low">0</span></button>
      <button class="tab" data-filter="ok">OK <span class="count" id="count-ok">0</span></button>
    </div>
  </div>
</header>

<main id="list"></main>

<button class="fab" id="addBtn" aria-label="Add item">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>
      <span id="sheetTitle">Add equipment</span>
      <button class="close-btn" id="closeSheet">×</button>
    </h2>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      <div class="field">
        <label for="itemName">Name</label>
        <input type="text" id="itemName" required placeholder="e.g. Safety gloves" />
      </div>
      <div class="row-2">
        <div class="field">
          <label for="itemQty">Current quantity</label>
          <input type="number" id="itemQty" min="0" value="0" required />
        </div>
        <div class="field">
          <label for="itemMin">Minimum threshold</label>
          <input type="number" id="itemMin" min="0" value="5" required />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="itemUnit">Unit</label>
          <input type="text" id="itemUnit" placeholder="pcs, box, roll..." />
        </div>
        <div class="field">
          <label for="itemCategory">Category</label>
          <input type="text" id="itemCategory" placeholder="PPE, Tools..." />
        </div>
      </div>
      <div class="field">
        <label for="itemLocation">Location</label>
        <input type="text" id="itemLocation" placeholder="Shelf A3, Warehouse..." />
      </div>
      <div class="actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none">Delete</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ========== CONFIGURATION ==========
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/library/d/1SOUPI6GBWbz1RP9OX0dX6Wi3QayYPiimGuhyExygu39rEHZ8-d1Hwgzx/1'; // ← Paste your Apps Script URL here
  // ===================================

  let items = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let isLoading = false;

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const overlay = $('overlay');
  const sheet = overlay.querySelector('.sheet');

  // Google Apps Script API functions
  async function loadFromSheets() {
    try {
      isLoading = true;
      render();
      
      const response = await fetch(APPS_SCRIPT_URL);
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error);
      }
      
      items = data.map(item => ({
        id: 'row_' + item.rowNumber,
        ...item
      }));
      
      isLoading = false;
      render();
    } catch (err) {
      console.error('Error loading from Sheets:', err);
      toast('Error loading data: ' + err.message);
      isLoading = false;
      render();
    }
  }

  async function saveToSheets(item) {
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action: 'update',
          row: item.rowNumber,
          name: item.name,
          qty: item.qty,
          min: item.min,
          unit: item.unit,
          category: item.category,
          location: item.location
        })
      });
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const result = await response.json();
      
      if (!result.success) {
        throw new Error(result.message);
      }
      
      await loadFromSheets();
      toast('Saved successfully');
    } catch (err) {
      console.error('Error saving to Sheets:', err);
      toast('Error saving: ' + err.message);
    }
  }

  async function addToSheets(item) {
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action: 'add',
          name: item.name,
          qty: item.qty,
          min: item.min,
          unit: item.unit,
          category: item.category,
          location: item.location
        })
      });
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const result = await response.json();
      
      if (!result.success) {
        throw new Error(result.message);
      }
      
      await loadFromSheets();
      toast('Added successfully');
    } catch (err) {
      console.error('Error adding to Sheets:', err);
      toast('Error adding: ' + err.message);
    }
  }

  async function deleteFromSheets(item) {
    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8',
        },
        body: JSON.stringify({
          action: 'delete',
          row: item.rowNumber
        })
      });
      
      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }
      
      const result = await response.json();
      
      if (!result.success) {
        throw new Error(result.message);
      }
      
      await loadFromSheets();
      toast('Deleted successfully');
    } catch (err) {
      console.error('Error deleting from Sheets:', err);
      toast('Error deleting: ' + err.message);
    }
  }

  function statusOf(item) {
    if (item.qty <= 0) return 'out';
    if (item.qty <= item.min) return 'low';
    return 'ok';
  }

  function statusLabel(s) {
    return s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'OK';
  }

  function render() {
    if (isLoading) {
      listEl.innerHTML = '<div class="empty"><h3>Loading...</h3></div>';
      return;
    }

    let cAll = 0, cOut = 0, cLow = 0, cOk = 0;
    items.forEach(it => {
      cAll++;
      const s = statusOf(it);
      if (s === 'out') cOut++;
      else if (s === 'low') cLow++;
      else cOk++;
    });
    $('count-all').textContent = cAll;
    $('count-out').textContent = cOut;
    $('count-low').textContent = cLow;
    $('count-ok').textContent = cOk;

    const q = currentSearch.trim().toLowerCase();
    let filtered = items.filter(it => {
      if (currentFilter !== 'all' && statusOf(it) !== currentFilter) return false;
      if (!q) return true;
      return (it.name + ' ' + (it.category||'') + ' ' + (it.location||''))
        .toLowerCase().includes(q);
    });

    const order = { out: 0, low: 1, ok: 2 };
    filtered.sort((a,b) => {
      const sa = order[statusOf(a)], sb = order[statusOf(b)];
      if (sa !== sb) return sa - sb;
      return a.name.localeCompare(b.name);
    });

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <path d="M3.3 7 12 12l8.7-5M12 22V12"/>
          </svg>
          <h3>${items.length === 0 ? 'No equipment yet' : 'Nothing matches'}</h3>
          <p>${items.length === 0 ? 'Add items in Google Sheets or tap + to add' : 'Try a different search or filter.'}</p>
        </div>`;
      return;
    }

    listEl.innerHTML = filtered.map(it => {
      const s = statusOf(it);
      const unit = it.unit ? ` ${it.unit}` : '';

      const metaParts = [];
      metaParts.push(`<span class="qty ${s}">${it.qty}/${it.min}${unit}</span>`);
      if (it.category) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.category)}</span>`);
      if (it.location) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.location)}</span>`);

      return `
        <div class="item status-${s}" data-id="${it.id}">
          <div class="item-name">
            <span class="item-name-text">${escapeHtml(it.name)}</span>
            <span class="badge ${s}">${statusLabel(s)}</span>
          </div>
          <div class="item-meta">${metaParts.join('')}</div>
        </div>`;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  listEl.addEventListener('click', e => {
    const itemEl = e.target.closest('.item');
    if (!itemEl) return;
    const id = itemEl.dataset.id;
    const item = items.find(i => i.id === id);
    if (!item) return;
    openEdit(item);
  });

  $('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });

  $('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  $('addBtn').addEventListener('click', () => openEdit(null));

  $('closeSheet').addEventListener('click', closeSheet);
  $('cancelBtn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  function openEdit(item) {
    $('sheetTitle').textContent = item ? 'Edit equipment' : 'Add equipment';
    $('itemId').value = item ? item.id : '';
    $('itemName').value = item ? item.name : '';
    $('itemQty').value = item ? item.qty : 0;
    $('itemMin').value = item ? item.min : 5;
    $('itemUnit').value = item ? (item.unit || '') : '';
    $('itemCategory').value = item ? (item.category || '') : '';
    $('itemLocation').value = item ? (item.location || '') : '';
    $('deleteBtn').style.display = item ? 'block' : 'none';

    sheet.scrollTop = 0;
    overlay.classList.add('open');
    setTimeout(() => $('itemName').focus(), 200);
  }
  function closeSheet() { overlay.classList.remove('open'); }

  $('itemForm').addEventListener('submit', async e => {
    e.preventDefault();
    const id = $('itemId').value;
    const data = {
      name: $('itemName').value.trim(),
      qty: Math.max(0, parseInt($('itemQty').value) || 0),
      min: Math.max(0, parseInt($('itemMin').value) || 0),
      unit: $('itemUnit').value.trim(),
      category: $('itemCategory').value.trim(),
      location: $('itemLocation').value.trim(),
    };
    if (!data.name) return;
    
    $('saveBtn').disabled = true;
    $('saveBtn').textContent = 'Saving...';
    
    if (id && id.startsWith('row_')) {
      const item = items.find(i => i.id === id);
      Object.assign(item, data);
      await saveToSheets(item);
    } else {
      await addToSheets(data);
    }
    
    $('saveBtn').disabled = false;
    $('saveBtn').textContent = 'Save';
    closeSheet();
  });

  $('deleteBtn').addEventListener('click', async () => {
    const id = $('itemId').value;
    if (!id || !id.startsWith('row_')) return;
    
    if (confirm('Delete this item from Google Sheets?')) {
      const item = items.find(i => i.id === id);
      $('deleteBtn').disabled = true;
      await deleteFromSheets(item);
      $('deleteBtn').disabled = false;
      closeSheet();
    }
  });

  const menu = $('menu');
  $('menuBtn').addEventListener('click', e => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!menu.contains(e.target) && e.target !== $('menuBtn')) menu.classList.remove('open');
  });

  $('reloadBtn').addEventListener('click', async () => {
    $('reloadBtn').textContent = 'Loading...';
    await loadFromSheets();
    $('reloadBtn').textContent = '🔄 Refresh data';
    menu.classList.remove('open');
  });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  async function init() {
    if (APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbwKtyJJQkP0hV63zhTwnBX_zWJEZfu5Yp6IDr0JsyUEWXYECLqbDfKaJr_r9JSs12bh/exec') {
      listEl.innerHTML = `
        <div class="empty">
          <h3>⚠️ Configuration Required</h3>
          <p>Edit index.html and add your Apps Script URL</p>
        </div>`;
      return;
    }
    await loadFromSheets();
  }

  init();
})();
</script>
</body>
</html>
