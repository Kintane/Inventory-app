<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0e" />
<title>Equipment Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0b0b0e;
    --surface: #16161b;
    --surface-2: #1f1f26;
    --border: #2a2a33;
    --text: #ececf1;
    --text-dim: #9a9aa6;
    --text-faint: #6b6b76;
    --accent: #7c83ff;
    --accent-soft: rgba(124,131,255,0.15);
    --ok: #3ddc84;
    --ok-soft: rgba(61,220,132,0.12);
    --low: #ffaa33;
    --low-soft: rgba(255,170,51,0.12);
    --out: #ff4d5e;
    --out-soft: rgba(255,77,94,0.14);
    --shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  body { padding-bottom: 100px; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,11,14,0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
  }
  .header-content { max-width: 720px; margin: 0 auto; }
  .title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; position: relative;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .search { position: relative; margin-bottom: 10px; }
  .search input {
    width: 100%; padding: 11px 14px 11px 40px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s;
  }
  .search input:focus { border-color: var(--accent); }
  .search svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-faint);
  }
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 2px;
    justify-content: center;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 7px 14px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 14px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .tab .count {
    font-size: 12px; color: var(--text-faint);
    background: var(--surface-2); padding: 1px 7px; border-radius: 999px;
  }
  .tab.active {
    background: var(--accent-soft); border-color: var(--accent);
    color: var(--accent);
  }
  .tab.active .count { background: transparent; color: var(--accent); }
  
  .ptr-container {
    height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 500;
    user-select: none;
    -webkit-user-select: none;
    background: var(--bg);
    position: relative;
    z-index: 5;
  }
  .ptr-container.smooth {
    transition: height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .ptr-container.refreshing {
    height: 50px !important;
  }
  .ptr-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    display: none;
  }
  .ptr-container.refreshing .ptr-spinner {
    display: block;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  main { padding: 12px 16px; }
  .item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform 0.1s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item:active { transform: scale(0.99); }
  .item.status-out { border-color: rgba(255,77,94,0.35); background: linear-gradient(180deg, var(--out-soft), var(--surface)); }
  .item.status-low  { border-color: rgba(255,170,51,0.3);  background: linear-gradient(180deg, var(--low-soft), var(--surface)); }
  .item-name {
    font-size: 15px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .item-name-text {
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .item-meta .sep { color: var(--text-faint); }
  .item-meta .qty {
    font-weight: 600;
    padding: 1px 6px; border-radius: 6px;
  }
  .item-meta .qty.out { color: var(--out); background: var(--out-soft); }
  .item-meta .qty.low { color: var(--low); background: var(--low-soft); }
  .item-meta .qty.ok  { color: var(--ok);  background: var(--ok-soft); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 999px;
    vertical-align: middle; text-transform: uppercase; letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .badge.out { background: var(--out-soft); color: var(--out); }
  .badge.low { background: var(--low-soft); color: var(--low); }
  .badge.ok  { background: var(--ok-soft);  color: var(--ok); }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty svg { width: 56px; height: 56px; margin-bottom: 14px; opacity: 0.4; }
  .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty p { font-size: 14px; }
  .fab {
    position: fixed; bottom: 22px; right: 22px;
    width: 58px; height: 58px; border-radius: 18px;
    background: var(--accent); color: white;
    border: none; cursor: pointer;
    box-shadow: var(--shadow), 0 0 0 1px rgba(124,131,255,0.3);
    display: grid; place-items: center;
    transition: transform 0.15s;
    z-index: 20;
  }
  .fab:active { transform: scale(0.94); }
  .fab svg { width: 26px; height: 26px; }
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    display: none;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; animation: fadeIn 0.2s; }
  @media (max-width: 639px) {
    .overlay.open { align-items: flex-start; }
    .sheet {
      width: 100%; height: 100vh; height: 100dvh;
      max-height: 100vh; max-height: 100dvh;
      border-radius: 0;
      padding: 18px 18px 24px;
      padding-top: calc(18px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }
    .sheet-handle { display: none; }
  }
  @media (min-width: 640px) {
    .overlay.open { align-items: flex-end; }
    .sheet {
      width: 100%; max-width: 520px;
      border-radius: 20px 20px 0 0;
      padding: 18px 18px 24px;
      max-height: 92vh;
      overflow-y: auto;
      animation: slideUp 0.25s cubic-bezier(0.2,0.8,0.2,1);
    }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 14px;
  }
  .sheet h2 {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .close-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 24px; cursor: pointer; padding: 4px 8px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 13px; color: var(--text-dim);
    margin-bottom: 6px; font-weight: 500;
  }
  .field input, .field select {
    width: 100%; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 12px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface-2); color: var(--text); }
  .btn-danger { background: var(--out-soft); color: var(--out); border-color: rgba(255,77,94,0.3); }
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); color: var(--text);
    padding: 10px 18px; border-radius: 999px;
    border: 1px solid var(--border); font-size: 14px;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .last-updated {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    padding: 8px;
    margin-top: 4px;
  }
  @media (min-width: 640px) {
    main { max-width: 720px; margin: 0 auto; padding: 16px 24px; }
    header { padding: 16px 24px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="title-row">
      <h1>🧰 Equipment</h1>
    </div>

    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="text" id="search" placeholder="Search equipment..." />
    </div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="all">All <span class="count" id="count-all">0</span></button>
      <button class="tab" data-filter="out">Out <span class="count" id="count-out">0</span></button>
      <button class="tab" data-filter="low">Low <span class="count" id="count-low">0</span></button>
      <button class="tab" data-filter="ok">OK <span class="count" id="count-ok">0</span></button>
    </div>
  </div>
</header>

<div class="ptr-container" id="ptrContainer">
  <div class="ptr-spinner"></div>
  <span id="ptrText">Pull to refresh</span>
</div>

<main>
  <div id="list"></div>
</main>

<button class="fab" id="addBtn" aria-label="Add item">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>
      <span id="sheetTitle">Add equipment</span>
      <button class="close-btn" id="closeSheet">×</button>
    </h2>
    <form id="itemForm">
      <input type="hidden" id="itemId" />
      <div class="field">
        <label for="itemName">Name</label>
        <input type="text" id="itemName" required placeholder="e.g. Safety gloves" />
      </div>
      <div class="row-2">
        <div class="field">
          <label for="itemQty">Current quantity</label>
          <input type="number" id="itemQty" min="0" value="0" required />
        </div>
        <div class="field">
          <label for="itemMin">Minimum threshold</label>
          <input type="number" id="itemMin" min="0" value="5" required />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="itemUnit">Unit</label>
          <input type="text" id="itemUnit" placeholder="pcs, box, roll..." />
        </div>
        <div class="field">
          <label for="itemCategory">Category</label>
          <input type="text" id="itemCategory" placeholder="PPE, Tools..." />
        </div>
      </div>
      <div class="field">
        <label for="itemLocation">Location</label>
        <input type="text" id="itemLocation" placeholder="Shelf A3, Warehouse..." />
      </div>
      <div class="actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none">Delete</button>
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ========== CONFIGURATION ==========
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKtyJJQkP0hV63zhTwnBX_zWJEZfu5Yp6IDr0JsyUEWXYECLqbDfKaJr_r9JSs12bh/exec';
  const CACHE_KEY = 'equipment_cache_v2';
  const CACHE_MAX_AGE = 24 * 60 * 60 * 1000; // 24 hours
  // ===================================

  let items = [];
  let currentFilter = 'all';
  let currentSearch = '';
  let lastUpdateTime = null;
  let nextRowNumber = 2;

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const overlay = $('overlay');
  const sheet = overlay.querySelector('.sheet');

  // ========== PULL TO REFRESH ==========
  let startY = 0;
  let isPulling = false;
  let isRefreshing = false;
  const MAX_PULL = 80;
  const THRESHOLD = 50;
  const ptrContainer = $('ptrContainer');
  const ptrText = $('ptrText');

  document.addEventListener('touchstart', (e) => {
    if (overlay.classList.contains('open')) return;
    const scrollTop = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop;
    if (scrollTop <= 5 && !isRefreshing && e.touches && e.touches.length === 1) {
      startY = e.touches[0].clientY;
      isPulling = true;
      ptrContainer.classList.remove('smooth');
    }
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!isPulling || isRefreshing || !e.touches || e.touches.length !== 1) return;
    const currentY = e.touches[0].clientY;
    const diff = currentY - startY;

    if (diff > 0) {
      e.preventDefault();
      const pullDistance = Math.min(diff, MAX_PULL);
      ptrContainer.style.height = `${pullDistance}px`;
      if (pullDistance >= THRESHOLD) {
        ptrText.textContent = 'Release to refresh';
      } else {
        ptrText.textContent = 'Pull to refresh';
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', (e) => {
    if (!isPulling || isRefreshing) {
      isPulling = false;
      return;
    }
    isPulling = false;
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    const currentY = touch.clientY;
    const diff = currentY - startY;

    ptrContainer.classList.add('smooth');

    if (diff >= THRESHOLD) {
      triggerRefresh();
    } else {
      ptrContainer.style.height = '0px';
      ptrText.textContent = 'Pull to refresh';
    }
  });

  async function triggerRefresh() {
    isRefreshing = true;
    ptrContainer.classList.add('refreshing');
    ptrContainer.style.height = '50px';
    ptrText.textContent = 'Refreshing...';

    try {
      await loadAll(false, true);
    } catch (err) {
      console.error('Refresh failed:', err);
      toast('Refresh failed');
    } finally {
      isRefreshing = false;
      ptrContainer.classList.remove('refreshing');
      ptrContainer.style.height = '0px';
      ptrText.textContent = 'Pull to refresh';
    }
  }
  // ===================================

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  function saveCache(itemsToCache, timestamp) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        items: itemsToCache,
        timestamp: timestamp || Date.now()
      }));
    } catch (e) { console.warn('Cache save failed:', e); }
  }

  function formatTimeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    const days = Math.floor(hours / 24);
    return `${days}d ago`;
  }

  async function parseResponse(response) {
    const text = await response.text();
    try {
      return JSON.parse(text);
    } catch (e) {
      throw new Error('Invalid response');
    }
  }

  async function fetchFromSheets() {
    const response = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await parseResponse(response);
    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error('Invalid data');
    return data.map(item => ({
      id: 'row_' + item.rowNumber,
      ...item
    }));
  }

  async function postToSheets(payload) {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await parseResponse(response);
    if (!result.success) throw new Error(result.message || 'Failed');
    return result;
  }

  // ---------- Load ----------
  async function loadAll(silent = false, force = false) {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }

    if (!force && cached && cached.timestamp && (Date.now() - cached.timestamp) < CACHE_MAX_AGE) {
      return;
    }

    try {
      const freshItems = await fetchFromSheets();
      items = freshItems;
      lastUpdateTime = Date.now();
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      saveCache(items, lastUpdateTime);
      render();
      if (!silent) toast('Data refreshed');
    } catch (err) {
      console.error('Background fetch failed:', err);
      if (items.length === 0 && !silent) {
        toast('Could not load: ' + err.message);
      }
    }
  }

  // ---------- Mutations ----------
  async function addItem(data) {
    const newItem = {
      id: 'row_' + nextRowNumber,
      rowNumber: nextRowNumber,
      ...data
    };
    items.push(newItem);
    nextRowNumber++;
    saveCache(items);
    render();
    toast('Added');
    try { await postToSheets({ action: 'add', ...data }); } 
    catch (err) { console.error('Sync failed:', err); toast('Sync failed (saved locally)'); }
  }

  async function updateItem(item, data) {
    const original = { ...item };
    Object.assign(item, data);
    saveCache(items);
    render();
    toast('Updated');
    try {
      await postToSheets({ action: 'update', row: item.rowNumber, ...data });
    } catch (err) {
      console.error('Sync failed:', err);
      Object.assign(item, original);
      saveCache(items);
      render();
      toast('Save failed');
    }
  }

  async function deleteItem(item) {
    const originalItems = [...items];
    items = items.filter(i => i.id !== item.id);
    saveCache(items);
    render();
    toast('Deleted');
    try {
      await postToSheets({ action: 'delete', row: item.rowNumber });
    } catch (err) {
      console.error('Sync failed:', err);
      items = originalItems;
      saveCache(items);
      render();
      toast('Delete failed');
    }
  }

  // ---------- Render ----------
  function statusOf(item) {
    if (item.qty <= 0) return 'out';
    if (item.qty <= item.min) return 'low';
    return 'ok';
  }
  function statusLabel(s) {
    return s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'OK';
  }

  function render() {
    items = items.filter(item => item && item.name && item.name.trim() !== '');

    let cAll = 0, cOut = 0, cLow = 0, cOk = 0;
    items.forEach(it => {
      cAll++;
      const s = statusOf(it);
      if (s === 'out') cOut++;
      else if (s === 'low') cLow++;
      else cOk++;
    });
    $('count-all').textContent = cAll;
    $('count-out').textContent = cOut;
    $('count-low').textContent = cLow;
    $('count-ok').textContent = cOk;

    const q = currentSearch.trim().toLowerCase();
    let filtered = items.filter(it => {
      if (currentFilter !== 'all' && statusOf(it) !== currentFilter) return false;
      if (!q) return true;
      return (it.name + ' ' + (it.category||'') + ' ' + (it.location||'')).toLowerCase().includes(q);
    });

    const order = { out: 0, low: 1, ok: 2 };
    filtered.sort((a,b) => {
      const sa = order[statusOf(a)], sb = order[statusOf(b)];
      if (sa !== sb) return sa - sb;
      return (a.name || '').toString().localeCompare((b.name || '').toString());
    });

    let html = '';
    if (filtered.length === 0) {
      html = `
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <path d="M3.3 7 12 12l8.7-5M12 22V12"/>
          </svg>
          <h3>${items.length === 0 ? 'No equipment yet' : 'Nothing matches'}</h3>
          <p>${items.length === 0 ? 'Tap + to add your first item' : 'Try a different search or filter.'}</p>
        </div>`;
    } else {
      html = filtered.map(it => {
        const s = statusOf(it);
        const unit = it.unit ? ` ${it.unit}` : '';
        const metaParts = [];
        metaParts.push(`<span class="qty ${s}">${it.qty}/${it.min}${unit}</span>`);
        if (it.category) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.category)}</span>`);
        if (it.location) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.location)}</span>`);
        return `
          <div class="item status-${s}" data-id="${it.id}">
            <div class="item-name">
              <span class="item-name-text">${escapeHtml(it.name)}</span>
              <span class="badge ${s}">${statusLabel(s)}</span>
            </div>
            <div class="item-meta">${metaParts.join('')}</div>
          </div>`;
      }).join('');
    }

    if (lastUpdateTime) {
      html += `<div class="last-updated">Last updated: ${formatTimeAgo(lastUpdateTime)}</div>`;
    }

    listEl.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Events ----------
  listEl.addEventListener('click', e => {
    const itemEl = e.target.closest('.item');
    if (!itemEl) return;
    const item = items.find(i => i.id === itemEl.dataset.id);
    if (!item) return;
    openEdit(item);
  });

  $('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });

  $('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    render();
  });

  $('addBtn').addEventListener('click', () => openEdit(null));
  $('closeSheet').addEventListener('click', closeSheet);
  $('cancelBtn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  function openEdit(item) {
    $('sheetTitle').textContent = item ? 'Edit equipment' : 'Add equipment';
    $('itemId').value = item ? item.id : '';
    $('itemName').value = item ? item.name : '';
    $('itemQty').value = item ? item.qty : 0;
    $('itemMin').value = item ? item.min : 5;
    $('itemUnit').value = item ? (item.unit || '') : '';
    $('itemCategory').value = item ? (item.category || '') : '';
    $('itemLocation').value = item ? (item.location || '') : '';
    $('deleteBtn').style.display = item ? 'block' : 'none';
    sheet.scrollTop = 0;
    overlay.classList.add('open');
    setTimeout(() => $('itemName').focus(), 200);
  }
  function closeSheet() { overlay.classList.remove('open'); }

  $('itemForm').addEventListener('submit', e => {
    e.preventDefault();
    const id = $('itemId').value;
    const data = {
      name: $('itemName').value.trim(),
      qty: Math.max(0, parseInt($('itemQty').value) || 0),
      min: Math.max(0, parseInt($('itemMin').value) || 0),
      unit: $('itemUnit').value.trim(),
      category: $('itemCategory').value.trim(),
      location: $('itemLocation').value.trim(),
    };
    if (!data.name) return;
    closeSheet();
    if (id && id.startsWith('row_')) {
      updateItem(items.find(i => i.id === id), data);
    } else {
      addItem(data);
    }
  });

  $('deleteBtn').addEventListener('click', () => {
    const id = $('itemId').value;
    if (!id || !id.startsWith('row_')) return;
    if (confirm('Delete this item?')) {
      closeSheet();
      deleteItem(items.find(i => i.id === id));
    }
  });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ---------- Init ----------
  function init() {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }

    setTimeout(() => {
      loadAll(true, true).catch(err => {
        console.error('Initial background fetch failed:', err);
      });
    }, 300);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const cached = loadCache();
      const age = cached && cached.timestamp ? Date.now() - cached.timestamp : Infinity;
      if (age > 5 * 60 * 1000) {
        loadAll(true, true).catch(err => {
          console.error('Visibility refresh failed:', err);
        });
      }
    }
  });

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      loadAll(true, true).catch(err => {
        console.error('Pageshow refresh failed:', err);
      });
    }
  });

  init();
})();
</script>
</body>
</html>
