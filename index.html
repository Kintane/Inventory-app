<script>
(() => {
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxv8wsAQDDdYHPh2xoodc90Brt7gFW3J-lg5_ma_krKeKQMI-G5X2_u-b2QVeaj_EQWuw/exec';
  const CACHE_KEY = 'equipment_cache_v2';
  const CACHE_MAX_AGE = 24 * 60 * 60 * 1000;
  const SEARCH_DEBOUNCE_MS = 300;
  const DEFAULT_LIMIT = 20;

  let items = [];
  let currentCategory = '';
  let currentSearch = '';
  let currentLimit = DEFAULT_LIMIT;
  let displayLimit = DEFAULT_LIMIT;
  let lastUpdateTime = null;
  let nextRowNumber = 2;
  let searchDebounceTimer = null;

  // Image upload state
  let pendingImageUpload = null;
  let activeImageUploadId = 0;
  let currentLocalImageUrl = null;

  const $ = id => document.getElementById(id);
  const listEl = $('list');
  const overlay = $('overlay');
  const sheet = overlay.querySelector('.sheet');
  const categorySelect = $('categorySelect');
  const limitSelect = $('limitSelect');
  const confirmOverlay = $('confirmOverlay');

  let isModalOpen = false;
  let isConfirmOpen = false;
  let confirmResolver = null;

  function showConfirm(title, message, okLabel = 'Delete') {
    return new Promise((resolve) => {
      $('confirmTitle').textContent = title;
      $('confirmMessage').textContent = message;
      $('confirmOk').textContent = okLabel;
      confirmResolver = resolve;
      history.pushState({ confirmModal: true }, '');
      isConfirmOpen = true;
      confirmOverlay.classList.add('open');
    });
  }

  function closeConfirmInternal(result) {
    confirmOverlay.classList.remove('open');
    isConfirmOpen = false;
    if (confirmResolver) { 
      confirmResolver(result); 
      confirmResolver = null; 
    }
  }

  function closeConfirm(result) {
    if (!isConfirmOpen) return;
    if (history.state && history.state.confirmModal) {
      history.replaceState(null, '');
    }
    closeConfirmInternal(result !== undefined ? result : false);
  }

  function closeSheetInternal() {
    overlay.classList.remove('open');
    isModalOpen = false;
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  }

  function closeSheet() {
    if (isModalOpen) {
      if (history.state && history.state.modal) history.back();
      else closeSheetInternal();
    }
  }

  window.addEventListener('popstate', (e) => {
    if (isConfirmOpen) { 
      closeConfirmInternal(false); 
      return; 
    }
    if (isModalOpen) {
      const active = document.activeElement;
      const isInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
      if (isInput) { active.blur(); closeSheetInternal(); }
      else { closeSheetInternal(); }
    }
  });

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  }

  function saveCache(itemsToCache, timestamp) {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({ items: itemsToCache, timestamp: timestamp || Date.now() }));
    } catch (e) { console.warn('Cache save failed:', e); }
  }

  function formatTimeAgo(timestamp) {
    const seconds = Math.floor((Date.now() - timestamp) / 1000);
    if (seconds < 60) return 'just now';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `${minutes}m ago`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  async function parseResponse(response) {
    const text = await response.text();
    try { return JSON.parse(text); } catch (e) { throw new Error('Invalid response'); }
  }

  async function fetchFromSheets() {
    const response = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await parseResponse(response);
    if (data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error('Invalid data');
    return data.map(item => ({ id: 'row_' + item.rowNumber, ...item }));
  }

  async function postToSheets(payload) {
    const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await parseResponse(response);
    if (!result.success) throw new Error(result.message || 'Failed');
    return result;
  }

  async function compressImage(file, maxWidth = 1200, quality = 0.8) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let width = img.width;
          let height = img.height;
          
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(compressedDataUrl);
        };
        img.onerror = () => reject(new Error('Failed to load image'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  }

  async function uploadImageToDrive(file) {
    try {
      const compressedData = await compressImage(file, 481, 0.8);
      
      const result = await postToSheets({
        action: 'uploadImage',
        imageData: compressedData,
        filename: file.name.replace(/\.[^/.]+$/, "") + ".jpg"
      });
      
      return result.url;
    } catch (err) {
      throw err;
    }
  }

  async function deleteImageFromDrive(imageUrl) {
    try {
      const result = await postToSheets({
        action: 'deleteImage',
        imageUrl: imageUrl
      });
      
      return result.success;
    } catch (err) {
      console.error('Delete image failed:', err);
      throw err;
    }
  }

  async function loadAll(silent = false, force = false) {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }

    if (!force && cached && cached.timestamp && (Date.now() - cached.timestamp) < CACHE_MAX_AGE) {
      return;
    }

    try {
      const freshItems = await fetchFromSheets();
      items = freshItems;
      lastUpdateTime = Date.now();
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      saveCache(items, lastUpdateTime);
      render();
      if (!silent) toast('Data refreshed');
    } catch (err) {
      console.error('Background fetch failed:', err);
      if (items.length === 0 && !silent) toast('Could not load: ' + err.message);
    }
  }

  async function addItem(data) {
    const newItem = { id: 'row_' + nextRowNumber, rowNumber: nextRowNumber, ...data };
    items.push(newItem);
    nextRowNumber++;
    saveCache(items);
    render();
    toast('Added');
    try { await postToSheets({ action: 'add', ...data }); } 
    catch (err) { console.error('Sync failed:', err); toast('Sync failed (saved locally)'); }
  }

  async function updateItem(item, data) {
    const original = { ...item };
    Object.assign(item, data);
    saveCache(items);
    render();
    toast('Updated');
    try { await postToSheets({ action: 'update', row: item.rowNumber, ...data }); } 
    catch (err) {
      console.error('Sync failed:', err);
      Object.assign(item, original);
      saveCache(items);
      render();
      toast('Save failed');
    }
  }

  async function deleteItem(item) {
    const originalItems = [...items];
    
    if (item.image && item.image.trim() !== '') {
      try {
        await deleteImageFromDrive(item.image);
      } catch (err) {
        console.error('Failed to delete image from Drive:', err);
      }
    }
    
    items = items.filter(i => i.id !== item.id);
    saveCache(items);
    render();
    toast('Deleted');
    try { 
      await postToSheets({ action: 'delete', row: item.rowNumber }); 
    } catch (err) {
      console.error('Sync failed:', err);
      items = originalItems;
      saveCache(items);
      render();
      toast('Delete failed');
    }
  }

  function statusOf(item) {
    if (item.qty <= 0) return 'out';
    if (item.qty <= item.min) return 'low';
    return 'ok';
  }
  function statusLabel(s) { return s === 'out' ? 'Out' : s === 'low' ? 'Low' : 'OK'; }

  function getCategories() {
    const cats = new Set();
    items.forEach(it => { if (it.category && it.category.trim() !== '') cats.add(it.category.trim()); });
    return Array.from(cats).sort((a, b) => a.localeCompare(b));
  }

  function updateCategoryDropdown() {
    const categories = getCategories();
    const currentValue = categorySelect.value;
    categorySelect.innerHTML = '';
    const allOption = document.createElement('option');
    allOption.value = ''; allOption.textContent = 'All categories';
    categorySelect.appendChild(allOption);
    categories.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat; option.textContent = cat;
      categorySelect.appendChild(option);
    });
    if (currentValue && categories.includes(currentValue)) categorySelect.value = currentValue;
    else { categorySelect.value = ''; currentCategory = ''; }
    categorySelect.classList.toggle('empty', categories.length === 0);
  }

  function getFilteredList() {
    const q = currentSearch.trim().toLowerCase();
    let filtered = items.filter(it => {
      if (currentCategory && (it.category || '').trim() !== currentCategory) return false;
      if (!q) return true;
      return (it.name + ' ' + (it.category||'') + ' ' + (it.location||'')).toLowerCase().includes(q);
    });
    const order = { out: 0, low: 1, ok: 2 };
    filtered.sort((a,b) => {
      const sa = order[statusOf(a)], sb = order[statusOf(b)];
      if (sa !== sb) return sa - sb;
      return (a.name || '').toString().localeCompare((b.name || '').toString());
    });
    return filtered;
  }

  function render() {
    items = items.filter(item => item && item.name && item.name.trim() !== '');
    updateCategoryDropdown();
    const filtered = getFilteredList();
    const totalFiltered = filtered.length;
    const isUnlimited = currentLimit === 'all';
    const visibleItems = isUnlimited ? filtered : filtered.slice(0, displayLimit);
    const hasMore = !isUnlimited && totalFiltered > displayLimit;
    const remaining = totalFiltered - displayLimit;

    let html = '';
    if (totalFiltered === 0) {
      let emptyTitle = 'No equipment yet', emptyMsg = 'Tap + to add your first item';
      if (items.length > 0) {
        if (currentCategory && currentSearch) { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search or category.'; }
        else if (currentCategory) { emptyTitle = 'No items in this category'; emptyMsg = 'Try selecting a different category.'; }
        else { emptyTitle = 'Nothing matches'; emptyMsg = 'Try a different search.'; }
      }
      html = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <path d="M3.3 7 12 12l8.7-5M12 22V12"/>
        </svg>
        <h3>${emptyTitle}</h3><p>${emptyMsg}</p>
      </div>`;
    } else {
      html = visibleItems.map(it => {
        const s = statusOf(it);
        const unit = it.unit ? ` ${it.unit}` : '';
        const metaParts = [];
        metaParts.push(`<span class="qty ${s}">${it.qty}/${it.min}${unit}</span>`);
        if (it.category) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.category)}</span>`);
        if (it.location) metaParts.push(`<span class="sep">·</span><span>${escapeHtml(it.location)}</span>`);
        return `<div class="item status-${s}" data-id="${it.id}">
          <div class="item-name">
            <span class="item-name-text">${escapeHtml(it.name)}</span>
            <span class="badge ${s}">${statusLabel(s)}</span>
          </div>
          <div class="item-meta">${metaParts.join('')}</div>
        </div>`;
      }).join('');

      if (hasMore) {
        html += `<button class="load-more" id="loadMoreBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span>Load more</span>
          <span class="load-more-count">(${remaining} remaining)</span>
        </button>`;
      }
    }

    if (lastUpdateTime) html += `<div class="last-updated">Last updated: ${formatTimeAgo(lastUpdateTime)}</div>`;
    listEl.innerHTML = html;

    const loadMoreBtn = $('loadMoreBtn');
    if (loadMoreBtn) loadMoreBtn.addEventListener('click', handleLoadMore);
  }

  function handleLoadMore() {
    displayLimit += currentLimit;
    render();
    requestAnimationFrame(() => {
      const newBtn = $('loadMoreBtn');
      if (newBtn) newBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  listEl.addEventListener('click', e => {
    const itemEl = e.target.closest('.item');
    if (!itemEl) return;
    const item = items.find(i => i.id === itemEl.dataset.id);
    if (!item) return;
    openEdit(item);
  });

  categorySelect.addEventListener('change', e => { currentCategory = e.target.value; displayLimit = currentLimit === 'all' ? Infinity : currentLimit; render(); });
  limitSelect.addEventListener('change', e => {
    const val = e.target.value;
    currentLimit = val === 'all' ? 'all' : parseInt(val, 10);
    displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
    render();
  });
  $('search').addEventListener('input', e => {
    if (searchDebounceTimer) clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => {
      currentSearch = e.target.value;
      displayLimit = currentLimit === 'all' ? Infinity : currentLimit;
      render();
    }, SEARCH_DEBOUNCE_MS);
  });

  $('addBtn').addEventListener('click', () => openEdit(null));
  $('closeSheet').addEventListener('click', closeSheet);
  $('cancelBtn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  $('uploadBtn').addEventListener('click', () => {
    $('imageFileInput').click();
  });

  $('confirmCancel').addEventListener('click', () => closeConfirm(false));
  $('confirmOk').addEventListener('click', () => closeConfirm(true));
  confirmOverlay.addEventListener('click', e => {
    if (e.target === confirmOverlay) closeConfirm(false);
  });

  $('deleteImageBtn').addEventListener('click', async () => {
    const imageUrl = $('itemImageFile').value;
    
    // Invalidate any pending background upload
    activeImageUploadId++;
    pendingImageUpload = null;

    // Revoke local URL to prevent memory leaks
    if (currentLocalImageUrl) {
      URL.revokeObjectURL(currentLocalImageUrl);
      currentLocalImageUrl = null;
    }

    if (!imageUrl || imageUrl.trim() === '') {
      // Just clear the UI if it was only a local preview
      const img = $('itemImageDisplay');
      const placeholder = $('imagePlaceholder');
      img.src = '';
      img.classList.remove('loaded');
      placeholder.style.display = 'block';
      $('deleteImageBtn').disabled = true;
      return;
    }
    
    const confirmed = await showConfirm('Delete image?', 'This will delete the image from Google Drive and remove it from this item.', 'Delete Image');
    if (!confirmed) return;
    
    const deleteBtn = $('deleteImageBtn');
    const originalHtml = deleteBtn.innerHTML;
    
    try {
      deleteBtn.disabled = true;
      deleteBtn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite">
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
          <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
          <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
          <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
        </svg>
        <span>Deleting...</span>
      `;
      
      await deleteImageFromDrive(imageUrl);
      
      $('itemImageFile').value = '';
      const img = $('itemImageDisplay');
      const placeholder = $('imagePlaceholder');
      
      img.src = '';
      img.classList.remove('loaded');
      placeholder.style.display = 'block';
      
      toast('Image deleted');
    } catch (err) {
      console.error('Delete image failed:', err);
      toast('Failed to delete image: ' + err.message);
    } finally {
      deleteBtn.disabled = false;
      deleteBtn.innerHTML = originalHtml;
    }
  });

  $('imageFileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
      toast('Please select an image file');
      return;
    }

    // 1. Invalidate any previous pending uploads
    activeImageUploadId++;
    const myUploadId = activeImageUploadId;

    // 2. Immediate local preview (synchronous, instant)
    if (currentLocalImageUrl) {
      URL.revokeObjectURL(currentLocalImageUrl);
    }
    currentLocalImageUrl = URL.createObjectURL(file);
    
    const img = $('itemImageDisplay');
    const placeholder = $('imagePlaceholder');
    
    img.src = currentLocalImageUrl;
    img.classList.add('loaded');
    placeholder.style.display = 'none';
    $('deleteImageBtn').disabled = false;

    // 3. Background upload processing
    const uploadBtn = $('uploadBtn');
    const originalText = uploadBtn.innerHTML;
    uploadBtn.classList.add('uploading');
    uploadBtn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite">
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
        <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
        <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
      </svg>
      <span>Uploading...</span>
    `;

    pendingImageUpload = (async () => {
      try {
        const imageUrl = await uploadImageToDrive(file);
        
        // Only apply if this is still the active upload
        if (myUploadId === activeImageUploadId) {
          $('itemImageFile').value = imageUrl;
          // Swap to permanent URL to ensure it persists correctly
          img.src = imageUrl; 
          toast('Image uploaded!');
        }
      } catch (err) {
        console.error('Background upload failed:', err);
        if (myUploadId === activeImageUploadId) {
          toast('Upload failed: ' + err.message);
        }
      } finally {
        if (myUploadId === activeImageUploadId) {
          uploadBtn.classList.remove('uploading');
          uploadBtn.innerHTML = originalText;
          pendingImageUpload = null;
        }
      }
    })();
    
    // Reset input so the same file can be selected again if needed
    $('imageFileInput').value = '';
  });

  function loadImage(imageUrl) {
    const img = $('itemImageDisplay');
    const placeholder = $('imagePlaceholder');
    const deleteBtn = $('deleteImageBtn');
    
    // Clean up any local URL from previous session
    if (currentLocalImageUrl) {
      URL.revokeObjectURL(currentLocalImageUrl);
      currentLocalImageUrl = null;
    }
    
    img.src = '';
    img.classList.remove('loaded');
    placeholder.style.display = 'block';
    
    if (!imageUrl || imageUrl.trim() === '') {
      deleteBtn.disabled = true;
      return;
    }
    
    deleteBtn.disabled = false;
    
    let finalUrl = imageUrl.trim();
    let fileId = null;
    
    const thumbnailMatch = finalUrl.match(/[?&]id=([^&]+)/);
    if (thumbnailMatch) fileId = thumbnailMatch[1];
    
    const ucMatch = finalUrl.match(/\/d\/([^\/\?]+)/);
    if (ucMatch) fileId = ucMatch[1];
    
    const lhMatch = finalUrl.match(/lh3\.googleusercontent\.com\/d\/([^\/\?=]+)/);
    if (lhMatch) fileId = lhMatch[1];
    
    if (fileId) {
      finalUrl = 'https://lh3.googleusercontent.com/d/' + fileId + '=w1000';
    }
    
    img.src = finalUrl;
    
    img.onload = () => {
      img.classList.add('loaded');
      placeholder.style.display = 'none';
    };
    
    img.onerror = () => {
      console.error('Failed to load image:', finalUrl);
      img.classList.remove('loaded');
      placeholder.style.display = 'block';
    };
  }

  function openEdit(item) {
    $('sheetTitle').textContent = item ? 'Edit equipment' : 'Add equipment';
    $('itemId').value = item ? item.id : '';
    $('itemName').value = item ? item.name : '';
    $('itemQty').value = item ? item.qty : 0;
    $('itemMin').value = item ? item.min : 5;
    $('itemUnit').value = item ? (item.unit || '') : '';
    $('itemCategory').value = item ? (item.category || '') : '';
    $('itemLocation').value = item ? (item.location || '') : '';
    $('itemImageFile').value = item ? (item.image || '') : '';
    $('deleteBtn').style.display = item ? 'block' : 'none';
    
    loadImage(item ? item.image : '');
    
    sheet.scrollTop = 0;
    history.pushState({ modal: true }, '');
    isModalOpen = true;
    overlay.classList.add('open');
    setTimeout(() => $('itemName').focus(), 200);
  }

  $('itemForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Wait for any pending background image upload to finish before saving
    if (pendingImageUpload) {
      toast('Finishing image upload...');
      await pendingImageUpload;
    }

    const id = $('itemId').value;
    const data = {
      name: $('itemName').value.trim(),
      qty: Math.max(0, parseInt($('itemQty').value) || 0),
      min: Math.max(0, parseInt($('itemMin').value) || 0),
      unit: $('itemUnit').value.trim(),
      category: $('itemCategory').value.trim(),
      location: $('itemLocation').value.trim(),
      image: $('itemImageFile').value.trim()
    };
    if (!data.name) return;
    
    if (isModalOpen && history.state && history.state.modal) history.back();
    else closeSheetInternal();

    if (id && id.startsWith('row_')) updateItem(items.find(i => i.id === id), data);
    else addItem(data);
  });

  $('deleteBtn').addEventListener('click', async () => {
    const id = $('itemId').value;
    if (!id || !id.startsWith('row_')) return;
    const item = items.find(i => i.id === id);
    const confirmed = await showConfirm('Delete item?', `"${item ? item.name : 'This item'}" will be permanently removed along with its image.`, 'Delete');
    if (confirmed) { closeSheet(); deleteItem(item); }
  });

  let toastTimer;
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function init() {
    const cached = loadCache();
    if (cached && cached.items) {
      items = cached.items;
      lastUpdateTime = cached.timestamp;
      nextRowNumber = Math.max(...items.map(i => i.rowNumber || 0), 1) + 1;
      render();
    }
    setTimeout(() => {
      loadAll(true, true).catch(err => console.error('Initial background fetch failed:', err));
    }, 300);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const cached = loadCache();
      const age = cached && cached.timestamp ? Date.now() - cached.timestamp : Infinity;
      if (age > 5 * 60 * 1000) {
        loadAll(true, true).catch(err => console.error('Visibility refresh failed:', err));
      }
    }
  });

  window.addEventListener('pageshow', (e) => {
    if (e.persisted) loadAll(true, true).catch(err => console.error('Pageshow refresh failed:', err));
  });

  init();
})();
</script>
